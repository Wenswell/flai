name: CI

on:
  push:
    branches: [main]
    tags-ignore: ['**']      # 忽略所有 tag 推送
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'pnpm'

      - run: corepack enable

      - run: pnpm install --frozen-lockfile

      - run: pnpm test

      - run: pnpm pack:check
